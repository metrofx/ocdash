<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen pb-20">
  <div class="max-w-2xl mx-auto px-4 py-6">
    <header class="mb-6">
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white">OpenClaw Dashboard</h1>
      <p class="text-gray-600 dark:text-gray-400 text-sm">Monitor your OpenClaw gateway</p>
    </header>

    <div class="flex justify-between items-center mb-4">
      <span id="status-msg" class="text-sm text-gray-600 dark:text-gray-400"></span>
      <button id="refresh-btn"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">
        Refresh
      </button>
    </div>

    <!-- System Status Section -->
    <section class="mb-8 bg-white dark:bg-gray-800 rounded-lg shadow p-4">
      <h2 class="text-lg font-semibold mb-3 text-gray-800 dark:text-gray-200">System Status</h2>
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div>
          <p class="text-gray-500 dark:text-gray-400">OpenClaw Version</p>
          <p id="openclaw-version" class="font-medium text-gray-900 dark:text-white">-</p>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400">Gateway Status</p>
          <p id="gateway-status" class="font-medium">-</p>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400">System Uptime</p>
          <p id="system-uptime" class="font-medium text-gray-900 dark:text-white">-</p>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400">System OS</p>
          <p id="system-os" class="font-medium text-gray-900 dark:text-white text-xs">-</p>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400">Active Sessions</p>
          <p id="active-sessions" class="font-medium text-gray-900 dark:text-white">-</p>
        </div>
        <div>
          <p class="text-gray-500 dark:text-gray-400">Total Agents</p>
          <p id="total-agents" class="font-medium text-gray-900 dark:text-white">-</p>
        </div>
      </div>

      <!-- Channels Status -->
      <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
        <p class="text-gray-500 dark:text-gray-400 text-sm mb-2">Channels</p>
        <div id="channels-status" class="space-y-2">
          <!-- Channel status will be inserted here -->
        </div>
      </div>
    </section>

    <!-- Agents Section -->
    <section class="mb-8">
      <div class="flex justify-between items-center mb-3 cursor-pointer" onclick="toggleSection('agents')">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-200">
          Agents <span id="agents-count" class="text-sm text-gray-500 dark:text-gray-400"></span>
        </h2>
        <span id="agents-toggle"
          class="text-gray-500 dark:text-gray-400 transform transition-transform rotate-[-90deg]">▼</span>
      </div>
      <div id="agents-cards" class="grid gap-3 hidden">
        <!-- Cards will be inserted here -->
      </div>
    </section>

    <!-- Sessions Section -->
    <section class="mb-8">
      <h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-gray-200">
        Sessions (Today) <span id="sessions-count" class="text-sm text-gray-500 dark:text-gray-400"></span>
      </h2>
      <div id="sessions-cards" class="grid gap-3">
        <!-- Cards will be inserted here -->
      </div>
    </section>

    <!-- Cron Jobs Section -->
    <section class="mb-8">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-200">
          Cron Jobs <span id="cron-count" class="text-sm text-gray-500 dark:text-gray-400"></span>
        </h2>
      </div>
      <div id="cron-cards" class="grid gap-3">
        <!-- Cards will be inserted here -->
      </div>
    </section>

    <!-- Token Usage Section -->
    <section class="mb-8">
      <h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-gray-200">Token Usage (48h)</h2>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
        <div class="relative" style="height: 300px;">
          <canvas id="token-chart"></canvas>
        </div>
      </div>
    </section>

    <!-- Model Usage Section -->
    <section class="mb-8">
      <h2 class="text-xl font-semibold mb-3 text-gray-800 dark:text-gray-200">Model Usage (48h)</h2>
      <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
        <div class="relative" style="height: 300px;">
          <canvas id="model-chart"></canvas>
        </div>
      </div>
    </section>

    <!-- Footer Links -->
    <footer class="mt-4 pb-2 text-center text-xs text-gray-500 dark:text-gray-400">
      <a href="https://github.com/metrofx/ocdash" target="_blank" rel="noopener noreferrer"
        class="hover:text-gray-700 dark:hover:text-gray-300 hover:underline transition-colors mt-2">GitHub</a>
      <span class="mx-1">|</span>
      <a href="https://saweria.co/xfortem" target="_blank" rel="noopener noreferrer"
        class="hover:text-gray-700 dark:hover:text-gray-300 hover:underline transition-colors mt-2">Donate</a>
    </footer>
  </div>

  <!-- Scroll to top button -->
  <button id="scroll-to-top"
    class="fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-lg transition-all opacity-0 pointer-events-none">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
    </svg>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>

</html>
